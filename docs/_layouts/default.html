<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" href="{{ '/logo.png' | relative_url }}" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;500;700;900&family=Red+Hat+Text:wght@400;500;700&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pf-bg-dark:        #151515;
      --pf-bg-card:        #1e1e1e;
      --pf-bg-hover:       #292929;
      --pf-border:         #3c3f42;
      --pf-text:           #e0e0e0;
      --pf-text-muted:     #8a8d90;
      --pf-red:            #ee0000;
      --pf-red-light:      #ff6060;
      --pf-blue:           #0066cc;
      --pf-blue-light:     #73bcf7;
      --pf-gold:           #f0ab00;
      --pf-green:          #3e8635;
      --pf-cyan:           #009596;
      --pf-purple:         #a18fff;
      --pf-code-bg:        #0f0f0f;
      --pf-radius:         8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Red Hat Text', -apple-system, sans-serif;
      background: var(--pf-bg-dark);
      color: var(--pf-text);
      line-height: 1.7;
      font-size: 16px;
    }

    .hero {
      background: linear-gradient(135deg, #0c0c0c 0%, #1a0000 50%, #0c0c0c 100%);
      border-bottom: 3px solid var(--pf-red);
      padding: 60px 20px 50px;
      text-align: center;
    }
    .hero img.logo { width: 80px; margin-bottom: 16px; filter: drop-shadow(0 0 20px rgba(238,0,0,0.3)); }
    .hero h1 {
      font-family: 'Red Hat Display', sans-serif;
      font-weight: 900;
      font-size: 2.6em;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--pf-red-light), var(--pf-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p.subtitle {
      color: var(--pf-text-muted);
      font-size: 1.15em;
      margin-top: 10px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }
    .hero .badges { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .hero .badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: 600;
      font-family: 'Red Hat Mono', monospace;
    }
    .badge-red   { background: var(--pf-red); color: #fff; }
    .badge-blue  { background: var(--pf-blue); color: #fff; }
    .badge-gold  { background: var(--pf-gold); color: #000; }
    .badge-cyan  { background: var(--pf-cyan); color: #fff; }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    h2 {
      font-family: 'Red Hat Display', sans-serif;
      font-weight: 700;
      font-size: 1.8em;
      margin: 48px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--pf-red);
      color: #fff;
    }
    h3 {
      font-family: 'Red Hat Display', sans-serif;
      font-weight: 600;
      font-size: 1.3em;
      margin: 32px 0 12px;
      color: var(--pf-blue-light);
    }

    p { margin-bottom: 16px; }
    a { color: var(--pf-blue-light); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--pf-gold); }
    strong { color: #fff; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin: 24px 0;
    }
    .card {
      background: var(--pf-bg-card);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      padding: 24px;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: var(--pf-red); transform: translateY(-2px); }
    .card h4 {
      font-family: 'Red Hat Display', sans-serif;
      font-size: 1.1em;
      color: #fff;
      margin-bottom: 8px;
    }
    .card p { color: var(--pf-text-muted); font-size: 0.95em; margin: 0; }
    .card .icon { font-size: 1.6em; margin-bottom: 10px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.92em;
    }
    th {
      background: var(--pf-bg-card);
      color: var(--pf-gold);
      text-align: left;
      padding: 10px 14px;
      font-family: 'Red Hat Display', sans-serif;
      font-weight: 600;
      border-bottom: 2px solid var(--pf-red);
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--pf-border);
    }
    tr:hover td { background: var(--pf-bg-hover); }
    code {
      font-family: 'Red Hat Mono', monospace;
      background: var(--pf-code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.88em;
      color: var(--pf-red-light);
    }
    pre {
      background: var(--pf-code-bg);
      border: 1px solid var(--pf-border);
      border-left: 4px solid var(--pf-red);
      border-radius: var(--pf-radius);
      padding: 18px 20px;
      overflow-x: auto;
      margin: 16px 0;
    }
    pre code { background: none; padding: 0; color: var(--pf-text); }

    .video-section { margin: 32px 0; }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 24px;
      margin: 20px 0;
    }
    .video-card {
      background: var(--pf-bg-card);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .video-card:hover { border-color: var(--pf-red); }
    .video-card .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }
    .video-card .video-wrapper.shorts {
      padding-bottom: 177.78%;
      max-height: 500px;
    }
    .video-card .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    .video-card .video-info {
      padding: 16px;
    }
    .video-card .video-info h4 {
      font-family: 'Red Hat Display', sans-serif;
      color: #fff;
      margin-bottom: 4px;
    }
    .video-card .video-info p {
      color: var(--pf-text-muted);
      font-size: 0.9em;
      margin: 0;
    }

    .screenshot {
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      overflow: hidden;
      margin: 20px 0;
      transition: border-color 0.2s;
    }
    .screenshot:hover { border-color: var(--pf-red); }
    .screenshot img { width: 100%; display: block; }
    .screenshot .caption {
      background: var(--pf-bg-card);
      padding: 10px 16px;
      font-size: 0.9em;
      color: var(--pf-text-muted);
      border-top: 1px solid var(--pf-border);
    }

    .arch-diagram {
      background: var(--pf-code-bg);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      padding: 24px;
      overflow-x: auto;
      margin: 20px 0;
      font-family: 'Red Hat Mono', monospace;
      font-size: 0.85em;
      line-height: 1.5;
      color: var(--pf-text);
    }

    .install-box {
      background: var(--pf-bg-card);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      padding: 24px;
      margin: 20px 0;
    }
    .install-box h4 {
      font-family: 'Red Hat Display', sans-serif;
      color: var(--pf-gold);
      margin-bottom: 12px;
    }

    footer {
      border-top: 1px solid var(--pf-border);
      padding: 30px 20px;
      text-align: center;
      color: var(--pf-text-muted);
      font-size: 0.9em;
    }
    footer a { color: var(--pf-red-light); }

    @media (max-width: 600px) {
      .hero h1 { font-size: 1.8em; }
      .video-card .video-wrapper.shorts { max-height: 400px; }
    }
  </style>
</head>
<body>

  {{ content }}

  <footer>
    <p>
      <strong>rhbk-neuroface</strong> v1.0.0 &middot;
      <a href="https://github.com/maximilianoPizarro/rhbk-biometric-flow">GitHub</a> &middot;
      <a href="https://github.com/maximilianoPizarro/neuroface">NeuroFace</a> &middot;
      Apache 2.0 License
    </p>
  </footer>

</body>
</html>
